<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" width="200" height="240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A1628"/>
      <stop offset="100%" style="stop-color:#0D3B66"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#14919B" stop-opacity="0.5"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#14919B" stop-opacity="0.6"/>
      <stop offset="100%" style="stop-color:#45E3C8"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#45E3C8" stop-opacity="0.7"/>
      <stop offset="100%" style="stop-color:#0AF5B2"/>
    </linearGradient>
    <linearGradient id="turfG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14919B"/>
      <stop offset="100%" style="stop-color:#45E3C8"/>
    </linearGradient>
    <filter id="gl">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="200" height="240" rx="32" fill="url(#bg)"/>
  
  <!-- Icon -->
  <g transform="translate(45, 30)">
    <rect x="0" y="80" width="28" height="55" rx="6" fill="url(#bar1)"/>
    <rect x="40" y="48" width="28" height="87" rx="6" fill="url(#bar2)"/>
    <rect x="80" y="14" width="28" height="121" rx="6" fill="url(#bar3)"/>
    
    <circle cx="14" cy="67" r="7" fill="#14919B" filter="url(#gl)"/>
    <circle cx="54" cy="35" r="7" fill="#45E3C8" filter="url(#gl)"/>
    <circle cx="94" cy="2" r="8" fill="#0AF5B2" filter="url(#gl)"/>
    
    <circle cx="14" cy="67" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="54" cy="35" r="3" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="94" cy="2" r="3.5" fill="#FFFFFF" opacity="0.8"/>
    
    <line x1="14" y1="67" x2="54" y2="35" stroke="#45E3C8" stroke-width="2" opacity="0.45"/>
    <line x1="54" y1="35" x2="94" y2="2" stroke="#0AF5B2" stroke-width="2" opacity="0.45"/>
    
    <path d="M94 -6 L94 -22 M87 -14 L94 -22 L101 -14" stroke="#0AF5B2" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)"/>
  </g>

  <!-- "AITurf" text mark below icon -->
  <text x="42" y="205" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="30" font-weight="800" letter-spacing="-1" fill="url(#turfG)">AI</text>
  <text x="80" y="205" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="30" font-weight="300" letter-spacing="1" fill="#E0EEF2">Turf</text>
</svg>
