<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <linearGradient id="accentG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0D3B66"/>
      <stop offset="100%" style="stop-color:#14919B"/>
    </linearGradient>
    <linearGradient id="bG1" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#14919B" stop-opacity="0.4"/><stop offset="100%" stop-color="#14919B"/></linearGradient>
    <linearGradient id="bG2" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#14919B" stop-opacity="0.5"/><stop offset="100%" stop-color="#0D8B78"/></linearGradient>
    <linearGradient id="bG3" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" stop-color="#0D8B78" stop-opacity="0.6"/><stop offset="100%" stop-color="#0D3B66"/></linearGradient>
    <filter id="ss"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#0D3B66" flood-opacity="0.15"/></filter>
  </defs>

  <rect width="720" height="280" fill="#FFFFFF"/>
  <pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><circle cx="20" cy="20" r="0.5" fill="#0D3B66" opacity="0.06"/></pattern>
  <rect width="720" height="280" fill="url(#g)"/>

  <!-- ═══ ICON ═══ -->
  <g transform="translate(78, 62)" filter="url(#ss)">
    <rect x="0" y="100" width="24" height="50" rx="5" fill="url(#bG1)"/>
    <rect x="32" y="65" width="24" height="85" rx="5" fill="url(#bG2)"/>
    <rect x="64" y="28" width="24" height="122" rx="5" fill="url(#bG3)"/>
    <circle cx="12" cy="88" r="5.5" fill="#14919B"/><circle cx="12" cy="88" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="44" cy="53" r="5.5" fill="#0D8B78"/><circle cx="44" cy="53" r="2.5" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="76" cy="16" r="6.5" fill="#0D3B66"/><circle cx="76" cy="16" r="3" fill="#FFFFFF" opacity="0.8"/>
    <line x1="12" y1="88" x2="44" y2="53" stroke="#14919B" stroke-width="2" opacity="0.4"/>
    <line x1="44" y1="53" x2="76" y2="16" stroke="#0D3B66" stroke-width="2" opacity="0.4"/>
    <path d="M76 8 L76 -14 M70 -7 L76 -14 L82 -7" stroke="#0D3B66" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ═══ "AITurf" centered ═══ -->
  <text text-anchor="middle" x="430" y="150" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="84">
    <tspan font-weight="800" letter-spacing="-2" fill="#0D3B66">AI</tspan><tspan font-weight="300" letter-spacing="2" fill="#14919B">Turf</tspan>
  </text>

  <!-- Tagline centered -->
  <text text-anchor="end" x="418" y="187" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" font-weight="500" letter-spacing="7" fill="#0D3B66" opacity="0.50">EDUCATE</text>
  <g transform="translate(430, 181)" fill="#14919B" opacity="0.55">
    <polygon points="0,-5.5 1.7,-1.7 5.5,0 1.7,1.7 0,5.5 -1.7,1.7 -5.5,0 -1.7,-1.7"/>
  </g>
  <text text-anchor="start" x="442" y="187" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" font-weight="500" letter-spacing="7" fill="#0D3B66" opacity="0.50">ELEVATE</text>

  <!-- Corners -->
  <path d="M24 24 L24 42 M24 24 L42 24" stroke="#0D3B66" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
  <path d="M696 24 L696 42 M696 24 L678 24" stroke="#0D3B66" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
  <path d="M24 256 L24 238 M24 256 L42 256" stroke="#0D3B66" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
  <path d="M696 256 L696 238 M696 256 L678 256" stroke="#0D3B66" stroke-width="1.2" opacity="0.1" stroke-linecap="round"/>
