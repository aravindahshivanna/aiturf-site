<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" width="720" height="280">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#14919B"/>
      <stop offset="50%" style="stop-color:#45E3C8"/>
      <stop offset="100%" style="stop-color:#0AF5B2"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#14919B"/>
      <stop offset="100%" style="stop-color:#0AF5B2"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#14919B" flood-opacity="0.3"/>
    </filter>
    <pattern id="np" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="#14919B" opacity="0.15"/>
      <circle cx="60" cy="0" r="1" fill="#14919B" opacity="0.15"/>
      <circle cx="30" cy="30" r="1" fill="#14919B" opacity="0.15"/>
      <circle cx="0" cy="60" r="1" fill="#14919B" opacity="0.15"/>
      <circle cx="60" cy="60" r="1" fill="#14919B" opacity="0.15"/>
      <line x1="0" y1="0" x2="30" y2="30" stroke="#14919B" stroke-width="0.3" opacity="0.1"/>
      <line x1="60" y1="0" x2="30" y2="30" stroke="#14919B" stroke-width="0.3" opacity="0.1"/>
      <line x1="30" y1="30" x2="0" y2="60" stroke="#14919B" stroke-width="0.3" opacity="0.1"/>
      <line x1="30" y1="30" x2="60" y2="60" stroke="#14919B" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>

  <rect width="720" height="280" fill="#0A1628"/>
  <rect width="720" height="280" fill="url(#np)"/>
  <circle cx="140" cy="130" r="100" fill="#14919B" opacity="0.06"/>

  <!-- ═══ ICON — moved closer to text ═══ -->
  <g transform="translate(78, 62)" filter="url(#shadow)">
    <rect x="0" y="100" width="22" height="50" rx="4" fill="url(#iconGrad)" opacity="0.6"/>
    <rect x="30" y="65" width="22" height="85" rx="4" fill="url(#iconGrad)" opacity="0.8"/>
    <rect x="60" y="30" width="22" height="120" rx="4" fill="url(#iconGrad)"/>
    <circle cx="11" cy="85" r="5" fill="#0AF5B2" filter="url(#glow)"/>
    <circle cx="41" cy="50" r="5" fill="#0AF5B2" filter="url(#glow)"/>
    <circle cx="71" cy="15" r="6" fill="#0AF5B2" filter="url(#glow)"/>
    <line x1="11" y1="85" x2="41" y2="50" stroke="#45E3C8" stroke-width="1.5" opacity="0.5"/>
    <line x1="41" y1="50" x2="71" y2="15" stroke="#45E3C8" stroke-width="1.5" opacity="0.5"/>
    <path d="M71 8 L71 -15 M65 -8 L71 -15 L77 -8" stroke="#0AF5B2" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  </g>

  <!-- ═══ "AITurf" — centered with icon as a unit ═══ -->
  <!-- Icon ends ~170px, text area 180-680, center ~430 -->
  <text text-anchor="middle" x="430" y="148" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="84" filter="url(#shadow)">
    <tspan font-weight="800" letter-spacing="-2" fill="url(#accentGrad)">AI</tspan><tspan font-weight="300" letter-spacing="2" fill="#E8F1F8">Turf</tspan>
  </text>

  <!-- Tagline centered under AITurf -->
  <text text-anchor="end" x="418" y="185" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" font-weight="400" letter-spacing="7" fill="#14919B" opacity="0.9">EDUCATE</text>
  <g transform="translate(430, 179)" fill="#45E3C8" opacity="0.85">
    <polygon points="0,-5.5 1.7,-1.7 5.5,0 1.7,1.7 0,5.5 -1.7,1.7 -5.5,0 -1.7,-1.7"/>
  </g>
  <text text-anchor="start" x="442" y="185" font-family="'Segoe UI', 'Helvetica Neue', sans-serif" font-size="15" font-weight="400" letter-spacing="7" fill="#14919B" opacity="0.9">ELEVATE</text>

  <!-- Corners -->
  <path d="M24 24 L24 42 M24 24 L42 24" stroke="#14919B" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <path d="M696 24 L696 42 M696 24 L678 24" stroke="#14919B" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <path d="M24 256 L24 238 M24 256 L42 256" stroke="#14919B" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <path d="M696 256 L696 238 M696 256 L678 256" stroke="#14919B" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
</svg>
